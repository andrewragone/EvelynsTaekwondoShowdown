<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Evelyn’s Taekwondo Showdown</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        #instructions {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 12px;
            background-color: rgba(0,0,0,0.5);
            padding: 5px;
            border-radius: 3px;
            display: none; /* Hidden by default, shown in gameplay */
            z-index: 10; /* Ensure it's above canvas */
        }
    </style>
</head>
<body>
    <div id="instructions">
        Desktop: Arrow Keys (Move/Jump), Spacebar (Attack)<br>
        Mobile: Use On-Screen Buttons
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        // --- Configuration ---
        const CONFIG = {
            CAMERA_POS: new THREE.Vector3(0, 2, 7),
            CHARACTER: {
                bodyRadius: 0.5, bodyHeight: 1.5,
                limbRadius: 0.2, limbHeight: 1.0,
                headRadius: 0.3,
                beltSize: new THREE.Vector3(1.05, 0.15, 0.55),
                skinColor: 0xf5d7b2,
                giColor: 0xffffff,
                opponentGiColor: 0xff0000,
                beltColor: 0x000000,
            },
            ARENA: {
                width: 10,
                floorColor: 0xd3d3d3,
                playerStartX: -2,
                opponentStartX: 2,
                boundaryLeft: -4.5, // Adjusted boundaries slightly
                boundaryRight: 4.5,
            },
            MOVEMENT: {
                speed: 0.05,
                jumpVelocity: 0.15,
                gravity: 0.008,
            },
            ATTACK: {
                punchReach: 1.2, punchDamage: 10, punchDuration: 300,
                kickReach: 1.7, kickDamage: 15, kickDuration: 500,
                cooldown: 100,
            },
            AI: {
                moveIntervalMin: 1000, moveIntervalMax: 2000,
                attackIntervalMin: 1500, attackIntervalMax: 3000,
                attackProbability: 0.7,
            },
            HEALTH: {
                max: 100,
                barWidth: 2, barHeight: 0.2, barOffset: 1.8,
                barColor: 0xff0000,
            },
            UI: {
                font: 'bold 32px Arial',
                fontColor: 'white',
                outlineColor: 'black',
                buttonWidth: 1.5, buttonHeight: 0.5,
                mobileButtonSize: 0.8,
                mobileButtonOpacity: 0.7,
            },
            COLORS: {
                introBg: 0x87ceeb,
                gameBg: 0x00008b,
                endBg: 0x800080,
                startButton: 0xff0000,
                playAgainButton: 0x00ff00,
                mobileLeftRight: 0x808080,
                mobileJump: 0xffff00,
                mobileAttack: 0xff0000,
            },
            ANIMATION: {
                textFadeTime: 1000,
                introHoldTime: 3000,
                introKickSpeed: 0.015,
                victoryPoseSpeed: 0.01,
            },
            CONFETTI: {
                count: 50,
                fallSpeed: 0.05,
                spawnY: 5,
                despawnY: -1,
                colors: [0xff0000, 0x00ff00, 0x0000ff, 0xffff00, 0xff00ff, 0x00ffff],
            }
        };

        // --- Global Variables ---
        let scene, camera, renderer, clock;
        let gameState = 'loading'; // loading, intro, gameplay, ending
        let player, opponent;
        let floor;
        let introText, startButton, endText, playAgainButton, confetti = [];
        let playerHealthBar, opponentHealthBar;
        let mobileButtons = {};
        let keysPressed = {}; // Store pressed keys/buttons
        let activeMobileInputs = {}; // Track active pointer IDs for mobile buttons

        // Initial player/opponent states
        const initialPlayerState = { jumping: false, velocityY: 0, attacking: false, attackType: 'punch', attackTimer: 0, lastAttackTime: 0, health: CONFIG.HEALTH.max, id: 'player' };
        const initialOpponentState = { attacking: false, attackType: 'punch', attackTimer: 0, moveDirection: 1, nextMoveTime: 0, nextAttackTime: 0, health: CONFIG.HEALTH.max, id: 'opponent' };

        let raycaster, pointer;

        // --- Initialization ---
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.copy(CONFIG.CAMERA_POS);
            camera.lookAt(0, 1, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();
            raycaster = new THREE.Raycaster();
            pointer = new THREE.Vector2();

            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            // Mobile / Pointer Events
            renderer.domElement.addEventListener('pointerdown', onPointerDown);
            renderer.domElement.addEventListener('pointerup', onPointerUp);
            renderer.domElement.addEventListener('pointermove', onPointerMove); // Needed to track movement off buttons
            renderer.domElement.addEventListener('pointerleave', onPointerLeave); // Handle pointer leaving canvas

            createMobileControls();
            setupSceneLighting();

            gameState = 'intro';
            setupIntro();

            animate();
        }

        function setupSceneLighting() {
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 7.5);
            scene.add(directionalLight);
        }

        // --- State Management & Scene Setup ---
        function clearScene() {
             const objectsToRemove = [];
             scene.children.forEach(child => {
                 if (child !== camera && !(child instanceof THREE.Light) && !Object.values(mobileButtons).includes(child) && child.type !== 'Group') { // Keep mobile buttons, check type for confetti group
                      objectsToRemove.push(child);
                 }
                 // Remove specific groups like confetti
                  if (child.name === 'confettiGroup') {
                      objectsToRemove.push(child);
                  }
             });
             // Remove player/opponent groups explicitly if they exist
             if (player && player.parent === scene) scene.remove(player);
             if (opponent && opponent.parent === scene) scene.remove(opponent);


            objectsToRemove.forEach(obj => {
                 if (obj.geometry) obj.geometry.dispose();
                 if (obj.material) {
                     if (Array.isArray(obj.material)) {
                         obj.material.forEach(mat => {
                              if (mat.map) mat.map.dispose();
                              mat.dispose();
                         });
                     } else {
                          if (obj.material.map) obj.material.map.dispose();
                          obj.material.dispose();
                     }
                 }
                 if(obj.parent === scene) scene.remove(obj); // Only remove top-level objects
             });
             player = null; // Nullify references
             opponent = null;
             playerHealthBar = null;
             opponentHealthBar = null;
             introText = null;
             startButton = null;
             endText = null;
             playAgainButton = null;
             floor = null;
             confetti = [];
             document.getElementById('instructions').style.display = 'none';
             keysPressed = {}; // Reset keys
             activeMobileInputs = {}; // Reset active touches
        }


        function setupIntro() {
            clearScene();
            gameState = 'intro';
            scene.background = new THREE.Color(CONFIG.COLORS.introBg);
            Object.values(mobileButtons).forEach(btn => { btn.visible = false; });

            player = createCharacter(CONFIG.CHARACTER.giColor, true);
            player.position.set(0, 0.75, 0);
            player.userData.introAnim = { kicking: true, legRotation: 0, returning: false };
            scene.add(player);

            const introLines = [
                "Evelyn’s Taekwondo Showdown:", "8th Birthday Party Edition", "",
                "Get ready to kick it at UMAC Briarcliff!"
            ];
            introText = createTextMesh(introLines.join('\n'), { x: 0, y: 3, z: 0 }, 0.8, true); // Adjusted scale/pos
            introText.material.opacity = 0;
            scene.add(introText);

            startButton = createButtonMesh("Start Fight", CONFIG.COLORS.startButton, { x: 0, y: -1.5, z: 0 });
            startButton.userData.action = 'startGame';
            scene.add(startButton);

            player.userData.introFadeInTimer = clock.getElapsedTime() + 0.1;
            player.userData.introHoldTimer = 0;
            player.userData.introFadeOutTimer = 0;
        }

        function startGameplay() {
            clearScene();
            gameState = 'gameplay';
            scene.background = new THREE.Color(CONFIG.COLORS.gameBg);
            document.getElementById('instructions').style.display = 'block';

            const floorGeometry = new THREE.PlaneGeometry(CONFIG.ARENA.width, CONFIG.ARENA.width);
            const floorMaterial = new THREE.MeshStandardMaterial({ color: CONFIG.COLORS.floorColor, side: THREE.DoubleSide });
            floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            player = createCharacter(CONFIG.CHARACTER.giColor, true);
            player.position.set(CONFIG.ARENA.playerStartX, 0.75, 0);
            player.userData = { ...initialPlayerState }; // Reset state
            scene.add(player);

            opponent = createCharacter(CONFIG.CHARACTER.opponentGiColor, false);
            opponent.position.set(CONFIG.ARENA.opponentStartX, 0.75, 0);
            opponent.userData = { ...initialOpponentState }; // Reset state
            opponent.userData.nextMoveTime = clock.getElapsedTime() + Math.random() * (CONFIG.AI.moveIntervalMax - CONFIG.AI.moveIntervalMin) + CONFIG.AI.moveIntervalMin;
            opponent.userData.nextAttackTime = clock.getElapsedTime() + Math.random() * (CONFIG.AI.attackIntervalMax - CONFIG.AI.attackIntervalMin) + CONFIG.AI.attackIntervalMin;
            scene.add(opponent);

            playerHealthBar = createHealthBar();
            playerHealthBar.position.set(player.position.x, player.position.y + CONFIG.HEALTH.barOffset, player.position.z);
            playerHealthBar.userData.initialX = playerHealthBar.position.x; // Store initial X for scaling
            scene.add(playerHealthBar);

            opponentHealthBar = createHealthBar();
            opponentHealthBar.position.set(opponent.position.x, opponent.position.y + CONFIG.HEALTH.barOffset, opponent.position.z);
            opponentHealthBar.userData.initialX = opponentHealthBar.position.x;
            scene.add(opponentHealthBar);

            keysPressed = {};
            activeMobileInputs = {};
            Object.values(mobileButtons).forEach(btn => { btn.visible = true; });
            positionMobileControls();
        }

        function setupEnding() {
            clearScene();
            gameState = 'ending';
            scene.background = new THREE.Color(CONFIG.COLORS.endBg);
            Object.values(mobileButtons).forEach(btn => { btn.visible = false; });

            player = createCharacter(CONFIG.CHARACTER.giColor, true);
            player.position.set(0, 0.75, 0);
            player.userData.victoryAnim = { raising: true, armRotation: 0, holding: false, holdTimer: 0 };
            scene.add(player);

            const endLines = [
                "Victory!", "To Be Continued at", "Evelyn’s Birthday Party!", "",
                "Join us at UMAC Briarcliff", "528 N State Rd, Briarcliff Manor, NY 10510",
                 "April 26, 2025 @ 2:00 PM", // *** EXAMPLE PARTY TIME ***
            ];
            endText = createTextMesh(endLines.join('\n'), { x: 0, y: 3, z: 0 }, 0.7, true); // Adjusted scale/pos
            endText.material.opacity = 0;
            scene.add(endText);

            playAgainButton = createButtonMesh("Play Again", CONFIG.COLORS.playAgainButton, { x: 0, y: -1.5, z: 0 });
            playAgainButton.userData.action = 'restartGame';
            scene.add(playAgainButton);

            createConfetti();

            player.userData.endFadeInTimer = clock.getElapsedTime() + 0.5;
        }

        // --- Asset Creation (Mostly unchanged, ensure materials allow transparency where needed) ---

        function createCharacter(giColor, hasBelt) {
            const group = new THREE.Group();
            // Use MeshStandardMaterial for consistency with lighting
            const bodyMat = new THREE.MeshStandardMaterial({ color: giColor, roughness: 0.8, metalness: 0.1 });
            const skinMat = new THREE.MeshStandardMaterial({ color: CONFIG.CHARACTER.skinColor, roughness: 0.8, metalness: 0.1 });
            const beltMat = new THREE.MeshStandardMaterial({ color: CONFIG.CHARACTER.beltColor, roughness: 0.5, metalness: 0.1 });

            // Body
            const bodyGeo = new THREE.CylinderGeometry(CONFIG.CHARACTER.bodyRadius, CONFIG.CHARACTER.bodyRadius, CONFIG.CHARACTER.bodyHeight, 8);
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = CONFIG.CHARACTER.bodyHeight / 2;
            group.add(body);
            group.userData.body = body;

            // Head
            const headGeo = new THREE.SphereGeometry(CONFIG.CHARACTER.headRadius, 12, 12); // Slightly smoother
            const head = new THREE.Mesh(headGeo, skinMat);
            head.position.y = CONFIG.CHARACTER.bodyHeight + CONFIG.CHARACTER.headRadius * 0.8;
            group.add(head);

            // Arms
            const armGeo = new THREE.CylinderGeometry(CONFIG.CHARACTER.limbRadius, CONFIG.CHARACTER.limbRadius, CONFIG.CHARACTER.limbHeight, 8);
            const leftArm = new THREE.Mesh(armGeo, bodyMat);
            leftArm.position.set(-CONFIG.CHARACTER.bodyRadius, CONFIG.CHARACTER.bodyHeight * 0.8, 0);
            leftArm.rotation.z = Math.PI / 6;
            group.add(leftArm);
            group.userData.leftArm = leftArm;

            const rightArm = new THREE.Mesh(armGeo, bodyMat);
            rightArm.position.set(CONFIG.CHARACTER.bodyRadius, CONFIG.CHARACTER.bodyHeight * 0.8, 0);
            rightArm.rotation.z = -Math.PI / 6;
            group.add(rightArm);
            group.userData.rightArm = rightArm;

            // Legs
            const legGeo = new THREE.CylinderGeometry(CONFIG.CHARACTER.limbRadius, CONFIG.CHARACTER.limbRadius, CONFIG.CHARACTER.limbHeight, 8);
            const leftLeg = new THREE.Mesh(legGeo, bodyMat);
            leftLeg.position.set(-CONFIG.CHARACTER.bodyRadius * 0.5, 0, 0); // Position legs under body center
            group.add(leftLeg);
            group.userData.leftLeg = leftLeg;

            const rightLeg = new THREE.Mesh(legGeo, bodyMat);
            rightLeg.position.set(CONFIG.CHARACTER.bodyRadius * 0.5, 0, 0);
            group.add(rightLeg);
            group.userData.rightLeg = rightLeg;

             // Adjust limb origins for better rotation (rotate around top)
             armGeo.translate(0, -CONFIG.CHARACTER.limbHeight / 2, 0);
             legGeo.translate(0, -CONFIG.CHARACTER.limbHeight / 2, 0);
             leftArm.position.y = CONFIG.CHARACTER.bodyHeight * 0.8 + CONFIG.CHARACTER.limbHeight / 2;
             rightArm.position.y = CONFIG.CHARACTER.bodyHeight * 0.8 + CONFIG.CHARACTER.limbHeight / 2;
             leftLeg.position.y = CONFIG.CHARACTER.limbHeight / 2; // Bottom of body + half leg height
             rightLeg.position.y = CONFIG.CHARACTER.limbHeight / 2;


            // Belt
            if (hasBelt) {
                const beltGeo = new THREE.BoxGeometry(CONFIG.CHARACTER.beltSize.x, CONFIG.CHARACTER.beltSize.y, CONFIG.CHARACTER.beltSize.z);
                const belt = new THREE.Mesh(beltGeo, beltMat);
                belt.position.y = CONFIG.CHARACTER.bodyHeight * 0.5;
                group.add(belt);
            }

            // Bounding Box for collisions (simplified)
            // We use the group's position and dimensions conceptually
            group.userData.boundingBox = new THREE.Box3(); // Will be updated

            // Set base position of the group correctly
            group.position.y = CONFIG.CHARACTER.limbHeight / 2; // Base is bottom of feet

            return group;
        }

        function createTextMesh(text, position, scale = 1, transparent = true, centerAlign = true) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            const lines = text.split('\n');
            const fontSize = 32 * window.devicePixelRatio; // Adjust for device pixel ratio
            context.font = CONFIG.UI.font.replace(/\d+px/, fontSize + 'px');

            let maxWidth = 0;
            lines.forEach(line => { maxWidth = Math.max(maxWidth, context.measureText(line).width); });
            const lineHeight = fontSize * 1.2;
            canvas.width = THREE.MathUtils.ceilPowerOfTwo(maxWidth + 20 * window.devicePixelRatio);
            canvas.height = THREE.MathUtils.ceilPowerOfTwo(lines.length * lineHeight + 10 * window.devicePixelRatio);

            context.font = CONFIG.UI.font.replace(/\d+px/, fontSize + 'px'); // Re-apply font after resize
            context.fillStyle = CONFIG.UI.fontColor;
            context.strokeStyle = CONFIG.UI.outlineColor;
            context.lineWidth = 4 * window.devicePixelRatio;
            context.textAlign = centerAlign ? 'center' : 'left';
            context.textBaseline = 'middle'; // Adjust baseline for better centering

            const startX = centerAlign ? canvas.width / 2 : 10 * window.devicePixelRatio;
            const startY = canvas.height / 2 - (lines.length - 1) * lineHeight / 2; // Center vertically

            lines.forEach((line, index) => {
                const yPos = startY + index * lineHeight;
                context.strokeText(line, startX, yPos);
                context.fillText(line, startX, yPos);
            });

            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            texture.minFilter = THREE.LinearFilter; // Nicer scaling

            const material = new THREE.MeshBasicMaterial({
                map: texture,
                transparent: transparent,
                opacity: transparent ? 0 : 1,
                depthTest: false, // Render text on top
                depthWrite: false,
            });

            const planeWidth = canvas.width / (150 / scale); // Adjust scaling base
            const planeHeight = canvas.height / (150 / scale);
            const geometry = new THREE.PlaneGeometry(planeWidth, planeHeight);
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(position.x, position.y, position.z);
            mesh.renderOrder = 1; // Ensure text renders on top
            return mesh;
        }


         function createButtonMesh(text, color, position) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            const fontSize = 48 * window.devicePixelRatio;
            const buttonPadding = 20 * window.devicePixelRatio;
            context.font = `bold ${fontSize}px Arial`;

            const textMetrics = context.measureText(text);
            const textWidth = textMetrics.width;
            canvas.width = THREE.MathUtils.ceilPowerOfTwo(textWidth + buttonPadding * 2);
            canvas.height = THREE.MathUtils.ceilPowerOfTwo(fontSize * 1.5);

            context.font = `bold ${fontSize}px Arial`; // Re-apply

            context.fillStyle = `rgb(${Math.floor(color >> 16 & 255)}, ${Math.floor(color >> 8 & 255)}, ${Math.floor(color & 255)})`;
            context.fillRect(0, 0, canvas.width, canvas.height);

            context.fillStyle = CONFIG.UI.fontColor;
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.fillText(text, canvas.width / 2, canvas.height / 2);

            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            texture.minFilter = THREE.LinearFilter;

            const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true, depthTest: false, depthWrite: false });
            const geometry = new THREE.PlaneGeometry(CONFIG.UI.buttonWidth, CONFIG.UI.buttonHeight);
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(position.x, position.y, position.z);
            mesh.renderOrder = 1; // Ensure button renders on top
            return mesh;
        }

        function createHealthBar() {
            const geometry = new THREE.PlaneGeometry(CONFIG.HEALTH.barWidth, CONFIG.HEALTH.barHeight);
            const material = new THREE.MeshBasicMaterial({ color: CONFIG.HEALTH.barColor, depthTest: false, depthWrite: false });
            const bar = new THREE.Mesh(geometry, material);
            bar.renderOrder = 1; // Ensure health bar renders on top
            return bar;
        }

        function updateHealthBar(bar, currentHealth, ownerPosition) {
            if (!bar) return;
            const healthPercentage = Math.max(0, currentHealth / CONFIG.HEALTH.max);
            bar.scale.x = healthPercentage;
            // Position relative to owner, adjust for scaling from center
            bar.position.x = ownerPosition.x - (CONFIG.HEALTH.barWidth * (1 - healthPercentage)) / 2;
            bar.position.y = ownerPosition.y + CONFIG.HEALTH.barOffset;
            bar.position.z = ownerPosition.z; // Keep Z aligned
        }


         function createMobileControls() {
             const buttonSize = CONFIG.UI.mobileButtonSize;
             const opacity = CONFIG.UI.mobileButtonOpacity;

             const createButton = (color, name, icon) => {
                 const canvas = document.createElement('canvas');
                 canvas.width = 64; canvas.height = 64;
                 const ctx = canvas.getContext('2d');

                 ctx.fillStyle = `rgba(${Math.floor(color >> 16 & 255)}, ${Math.floor(color >> 8 & 255)}, ${Math.floor(color & 255)}, ${opacity})`;
                 ctx.beginPath(); ctx.arc(32, 32, 30, 0, Math.PI * 2); ctx.fill();

                 ctx.fillStyle = 'white'; ctx.strokeStyle = 'black'; ctx.lineWidth = 3;
                 if (icon === 'left') { ctx.beginPath(); ctx.moveTo(45, 15); ctx.lineTo(19, 32); ctx.lineTo(45, 49); ctx.stroke(); ctx.fill(); }
                 else if (icon === 'right') { ctx.beginPath(); ctx.moveTo(19, 15); ctx.lineTo(45, 32); ctx.lineTo(19, 49); ctx.stroke(); ctx.fill(); }
                 else if (icon === 'up') { ctx.beginPath(); ctx.moveTo(32, 15); ctx.lineTo(47, 30); ctx.lineTo(37, 30); ctx.lineTo(37, 49); ctx.lineTo(27, 49); ctx.lineTo(27, 30); ctx.lineTo(17, 30); ctx.closePath(); ctx.stroke(); ctx.fill(); }
                 else if (icon === 'attack') { ctx.beginPath(); for (let i = 0; i < 8; i++) { const angle = (i / 8) * Math.PI * 2; const radius = (i % 2 === 0) ? 20 : 15; ctx.lineTo(32 + Math.cos(angle) * radius, 32 + Math.sin(angle) * radius); } ctx.closePath(); ctx.stroke(); ctx.fill(); }

                 const texture = new THREE.CanvasTexture(canvas); texture.needsUpdate = true; texture.minFilter = THREE.LinearFilter;
                 const geo = new THREE.PlaneGeometry(buttonSize, buttonSize);
                 // Use MeshBasicMaterial, depthTest: false to ensure they are drawn on top and don't interact with scene depth
                 const mat = new THREE.MeshBasicMaterial({ map: texture, transparent: true, opacity: 1, depthTest: false, depthWrite: false });
                 const mesh = new THREE.Mesh(geo, mat);
                 mesh.visible = false;
                 mesh.userData.action = name;
                 mesh.renderOrder = 2; // Render mobile controls above everything else
                 camera.add(mesh); // Add to camera
                 return mesh;
             };

             mobileButtons.left = createButton(CONFIG.COLORS.mobileLeftRight, 'moveLeft', 'left');
             mobileButtons.right = createButton(CONFIG.COLORS.mobileLeftRight, 'moveRight', 'right');
             mobileButtons.jump = createButton(CONFIG.COLORS.mobileJump, 'jump', 'up');
             mobileButtons.attack = createButton(CONFIG.COLORS.mobileAttack, 'attack', 'attack');
             positionMobileControls(); // Set initial positions
         }

        function positionMobileControls() {
            if(!mobileButtons.left) return; // Don't position if not created yet

            const H = window.innerHeight;
            const W = window.innerWidth;
            // Position based on viewport size using NDC-like values relative to camera
             const scaleFactor = Math.min(W, H) / 500; // Adjust base size for different screens
             const btnSize = CONFIG.UI.mobileButtonSize * scaleFactor;
             const margin = 0.15 * scaleFactor; // Margin scaled too

             Object.values(mobileButtons).forEach(btn => {btn.scale.set(scaleFactor, scaleFactor, 1)});

            // Use view coordinates (relative to camera)
            const aspect = W / H;
            const viewHeight = 4; // Adjust this based on camera FOV and distance if needed
            const viewWidth = viewHeight * aspect;
            const camZOffset = -3; // Push slightly further away

            // Positioning logic (bottom corners)
            const bottomY = -viewHeight / 2 + margin + btnSize / 2;
            const leftX = -viewWidth / 2 + margin + btnSize / 2;
            const rightX = viewWidth / 2 - margin - btnSize / 2;

            mobileButtons.left.position.set(leftX, bottomY, camZOffset);
            mobileButtons.right.position.set(leftX + btnSize + margin*0.5, bottomY, camZOffset); // Next to left

            mobileButtons.attack.position.set(rightX, bottomY, camZOffset);
            mobileButtons.jump.position.set(rightX - btnSize - margin*0.5, bottomY, camZOffset); // Next to attack

            // Ensure buttons added to camera are correctly oriented (only needed if camera moves/rotates significantly)
            // Object.values(mobileButtons).forEach(btn => btn.lookAt(camera.position)); // Usually not needed if camera is static
        }

        function createConfetti() {
            // (Confetti creation code is likely fine, ensure it's added to scene)
            const confettiGroup = new THREE.Group();
            confettiGroup.name = 'confettiGroup';
            const confettiGeo = new THREE.SphereGeometry(0.05, 6, 6);

            for (let i = 0; i < CONFIG.CONFETTI.count; i++) {
                const confettiMat = new THREE.MeshBasicMaterial({ color: CONFIG.CONFETTI.colors[Math.floor(Math.random() * CONFIG.CONFETTI.colors.length)] });
                const particle = new THREE.Mesh(confettiGeo, confettiMat);
                particle.position.set(
                    (Math.random() - 0.5) * CONFIG.ARENA.width * 0.8,
                    CONFIG.CONFETTI.spawnY + (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2
                );
                particle.userData.velocity = new THREE.Vector3(
                     (Math.random() - 0.5) * 0.01,
                     -CONFIG.CONFETTI.fallSpeed * (0.8 + Math.random() * 0.4),
                     (Math.random() - 0.5) * 0.01
                 );
                confettiGroup.add(particle);
                confetti.push(particle);
            }
            scene.add(confettiGroup);
        }


        // --- Event Handlers ---
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            positionMobileControls();
        }

        function onKeyDown(event) {
            keysPressed[event.code] = true;
            if (event.code === 'Space') { event.preventDefault(); handleAttackInput('player'); }
            if (event.code === 'ArrowUp') { event.preventDefault(); handleJumpInput('player'); }
        }

        function onKeyUp(event) {
            keysPressed[event.code] = false;
        }

        // --- Pointer (Mouse/Touch) Handlers ---
        function handlePointerInteraction(event, isDown) {
             // Calculate pointer position in normalized device coordinates (-1 to +1)
             pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
             pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;

             // Raycast against UI buttons attached to camera
             raycaster.setFromCamera(pointer, camera);
             const intersectsUI = raycaster.intersectObjects(Object.values(mobileButtons));

             if (intersectsUI.length > 0) {
                 const button = intersectsUI[0].object;
                 const action = button.userData.action;

                 if (isDown) {
                     activeMobileInputs[event.pointerId] = action; // Track which button this pointer pressed
                     if (action === 'moveLeft') keysPressed['MobileLeft'] = true;
                     else if (action === 'moveRight') keysPressed['MobileRight'] = true;
                     else if (action === 'jump') handleJumpInput('player');
                     else if (action === 'attack') handleAttackInput('player');
                 }
                 return true; // Indicate UI interaction happened
             }

             // Raycast against scene objects (Start/Play Again) only on pointer down
            if (isDown) {
                const sceneRaycaster = new THREE.Raycaster();
                sceneRaycaster.setFromCamera(pointer, camera);
                 let intersectsScene = [];
                 if (gameState === 'intro' && startButton) {
                     intersectsScene = sceneRaycaster.intersectObject(startButton);
                     if (intersectsScene.length > 0 && intersectsScene[0].object === startButton) {
                         startGameplay(); return true;
                     }
                 } else if (gameState === 'ending' && playAgainButton) {
                     intersectsScene = sceneRaycaster.intersectObject(playAgainButton);
                      if (intersectsScene.length > 0 && intersectsScene[0].object === playAgainButton) {
                          startGameplay(); return true;
                      }
                 }
            }
             return false; // No UI interaction
         }

        function onPointerDown(event) {
            event.preventDefault();
            handlePointerInteraction(event, true);
        }

        function onPointerUp(event) {
             event.preventDefault();
             const releasedAction = activeMobileInputs[event.pointerId];
             if (releasedAction === 'moveLeft') keysPressed['MobileLeft'] = false;
             if (releasedAction === 'moveRight') keysPressed['MobileRight'] = false;
             delete activeMobileInputs[event.pointerId]; // Clear tracked input

             // Might need to check if *any* pointer is still down on a move button
             // This simple version assumes one touch per button type at a time
             let stillMovingLeft = false;
             let stillMovingRight = false;
             for (const id in activeMobileInputs) {
                 if (activeMobileInputs[id] === 'moveLeft') stillMovingLeft = true;
                 if (activeMobileInputs[id] === 'moveRight') stillMovingRight = true;
             }
             if (!stillMovingLeft) keysPressed['MobileLeft'] = false;
             if (!stillMovingRight) keysPressed['MobileRight'] = false;
        }

        function onPointerMove(event) {
            // If a pointer moves off its button, treat it as pointer up for that button
            event.preventDefault();
             if (!activeMobileInputs[event.pointerId]) return; // Only care if this pointer was down on a button

             pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
             pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
             raycaster.setFromCamera(pointer, camera);
             const intersectsUI = raycaster.intersectObjects(Object.values(mobileButtons));

             let stillOnButton = false;
             if (intersectsUI.length > 0) {
                 if(intersectsUI[0].object.userData.action === activeMobileInputs[event.pointerId]) {
                    stillOnButton = true;
                 }
             }

             if (!stillOnButton) {
                // Moved off the button, trigger release for that action
                const releasedAction = activeMobileInputs[event.pointerId];
                if (releasedAction === 'moveLeft') keysPressed['MobileLeft'] = false;
                if (releasedAction === 'moveRight') keysPressed['MobileRight'] = false;
                 delete activeMobileInputs[event.pointerId];

                 // Re-check if any *other* pointer is still holding move buttons
                 // (Same logic as onPointerUp)
                 let stillMovingLeft = false;
                 let stillMovingRight = false;
                 for (const id in activeMobileInputs) {
                     if (activeMobileInputs[id] === 'moveLeft') stillMovingLeft = true;
                     if (activeMobileInputs[id] === 'moveRight') stillMovingRight = true;
                 }
                 if (!stillMovingLeft) keysPressed['MobileLeft'] = false;
                 if (!stillMovingRight) keysPressed['MobileRight'] = false;
             }
        }

        function onPointerLeave(event) {
             // Treat leaving the canvas like pointer up for all active inputs from that pointer
             event.preventDefault();
             onPointerUp(event); // Simulate pointer up
        }


        // --- Input Processing ---
        function handleJumpInput(characterId) {
            const char = (characterId === 'player') ? player : opponent;
            if (!char || !char.userData) return; // Guard
            if (!char.userData.jumping && gameState === 'gameplay') {
                char.userData.jumping = true;
                char.userData.velocityY = CONFIG.MOVEMENT.jumpVelocity;
            }
        }

        function handleAttackInput(characterId) {
            const char = (characterId === 'player') ? player : opponent;
             if (!char || !char.userData) return; // Guard
            const now = clock.getElapsedTime() * 1000;

            if (!char.userData.attacking && gameState === 'gameplay' && (now - char.userData.lastAttackTime > CONFIG.ATTACK.cooldown)) {
                char.userData.attacking = true;
                // Alternate punch/kick ONLY for player for simplicity, AI randomizes later
                if (characterId === 'player') {
                   char.userData.attackType = (char.userData.attackType === 'punch') ? 'kick' : 'punch';
                } else {
                    char.userData.attackType = (Math.random() < 0.5) ? 'punch' : 'kick'; // AI random attack
                }
                char.userData.attackTimer = (char.userData.attackType === 'punch') ? CONFIG.ATTACK.punchDuration : CONFIG.ATTACK.kickDuration;
                char.userData.lastAttackTime = now;
                animateAttack(char, char.userData.attackType);
            }
        }

        // --- Game Logic ---
         function updatePlayer(deltaTime) {
             if (!player || !player.userData || gameState !== 'gameplay') return;

             // --- Movement ---
             const moveSpeed = CONFIG.MOVEMENT.speed;
             let moveDelta = 0;
             if (keysPressed['ArrowLeft'] || keysPressed['MobileLeft']) moveDelta -= moveSpeed;
             if (keysPressed['ArrowRight'] || keysPressed['MobileRight']) moveDelta += moveSpeed;

             player.position.x += moveDelta;

             // Clamp position within boundaries
             player.position.x = Math.max(CONFIG.ARENA.boundaryLeft, player.position.x);
             // Prevent overlapping opponent *only if opponent exists*
             if (opponent && opponent.position) {
                  const opponentBoundary = opponent.position.x - CONFIG.CHARACTER.bodyRadius * 2; // Where player should stop
                  player.position.x = Math.min(opponentBoundary, player.position.x);
             } else {
                 // If no opponent yet, use the general right boundary
                  player.position.x = Math.min(CONFIG.ARENA.boundaryRight, player.position.x);
             }


            // --- Jumping ---
            const groundY = CONFIG.CHARACTER.limbHeight / 2; // Base ground position
            if (player.userData.jumping) {
                player.position.y += player.userData.velocityY;
                player.userData.velocityY -= CONFIG.MOVEMENT.gravity;

                if (player.position.y <= groundY) {
                    player.position.y = groundY;
                    player.userData.jumping = false;
                    player.userData.velocityY = 0;
                }
            } else {
                 // Ensure player stays on ground if not jumping
                 player.position.y = groundY;
            }

             // --- Attack Timer & Animation Update ---
             if (player.userData.attacking) {
                 player.userData.attackTimer -= deltaTime * 1000;
                 updateAttackAnimation(player, deltaTime); // Update animation progress
                 if (player.userData.attackTimer <= 0) {
                     player.userData.attacking = false;
                     resetLimbs(player);
                 } else {
                     // Check hit only if opponent exists
                      if (opponent) checkAttackHit(player, opponent);
                 }
             }

             updateHealthBar(playerHealthBar, player.userData.health, player.position);
             // player.userData.boundingBox.setFromObject(player, true); // Optional for debug
        }

        function updateOpponent(deltaTime) {
             if (!opponent || !opponent.userData || gameState !== 'gameplay') return;
             const now = clock.getElapsedTime();
             const groundY = CONFIG.CHARACTER.limbHeight / 2;

            // Ensure opponent stays on ground (no AI jump implemented)
            opponent.position.y = groundY;

            // --- AI Movement ---
            if (now > opponent.userData.nextMoveTime && !opponent.userData.attacking) {
                opponent.userData.moveDirection = (Math.random() > 0.5) ? 1 : -1;
                 opponent.userData.nextMoveTime = now + (Math.random() * (CONFIG.AI.moveIntervalMax - CONFIG.AI.moveIntervalMin) + CONFIG.AI.moveIntervalMin) / 1000;
             }

             // Move only if not attacking, timer allows, and player exists
             if (!opponent.userData.attacking && now < opponent.userData.nextMoveTime && player && player.position) {
                  const moveSpeed = CONFIG.MOVEMENT.speed * 0.8;
                  opponent.position.x += opponent.userData.moveDirection * moveSpeed;

                  // Clamp position
                  opponent.position.x = Math.min(CONFIG.ARENA.boundaryRight, opponent.position.x);
                  const playerBoundary = player.position.x + CONFIG.CHARACTER.bodyRadius * 2;
                  opponent.position.x = Math.max(playerBoundary, opponent.position.x);
             }

            // --- AI Attack ---
            if (now > opponent.userData.nextAttackTime && !opponent.userData.attacking) {
                // Attack only if player exists and AI decides to
                if (player && Math.random() < CONFIG.AI.attackProbability) {
                    handleAttackInput('opponent');
                }
                opponent.userData.nextAttackTime = now + (Math.random() * (CONFIG.AI.attackIntervalMax - CONFIG.AI.attackIntervalMin) + CONFIG.AI.attackIntervalMin) / 1000;
            }

             // --- Attack Timer & Animation Update ---
             if (opponent.userData.attacking) {
                 opponent.userData.attackTimer -= deltaTime * 1000;
                 updateAttackAnimation(opponent, deltaTime);
                 if (opponent.userData.attackTimer <= 0) {
                     opponent.userData.attacking = false;
                     resetLimbs(opponent);
                 } else {
                     // Check hit only if player exists
                      if (player) checkAttackHit(opponent, player);
                 }
             }

             updateHealthBar(opponentHealthBar, opponent.userData.health, opponent.position);
             // opponent.userData.boundingBox.setFromObject(opponent, true); // Optional for debug
        }


         function checkAttackHit(attacker, target) {
             if (!attacker || !target || !attacker.userData || !target.userData || !attacker.userData.attacking) return;

             const attackType = attacker.userData.attackType;
             const reach = (attackType === 'punch') ? CONFIG.ATTACK.punchReach : CONFIG.ATTACK.kickReach;
             const damage = (attackType === 'punch') ? CONFIG.ATTACK.punchDamage : CONFIG.ATTACK.kickDamage;

             // Check distance between origins
             const distance = attacker.position.distanceTo(target.position);

             if (distance < reach) {
                 if (!attacker.userData.hitThisAttack) {
                     target.userData.health -= damage;
                     target.userData.health = Math.max(0, target.userData.health);
                     attacker.userData.hitThisAttack = true; // Mark hit for this attack sequence

                     console.log(`${attacker.userData.id} hit ${target.userData.id} (${attackType}). ${target.userData.id} health: ${target.userData.health}`);

                     // Check for win/loss condition
                     if (target.userData.health <= 0) {
                         if(target.userData.id === 'opponent') {
                              console.log("Player wins!");
                              setupEnding();
                         } else {
                              console.log("Opponent wins! Restarting.");
                              // Optional: Add a specific 'Game Over' screen later
                               startGameplay(); // Simple restart for now
                          }
                     }
                 }
             }
         }

        // --- Animations (Ensure check for character existence) ---
         function animateAttack(character, type) {
              if (!character || !character.userData) return;
              resetLimbs(character);
              character.userData.hitThisAttack = false;

              const arm = character.userData.rightArm;
              const leg = character.userData.rightLeg;
              const duration = (type === 'punch' ? CONFIG.ATTACK.punchDuration : CONFIG.ATTACK.kickDuration) / 1000;

              if (!arm || !leg) return; // Guard if limbs somehow missing

              const targetRotationAxis = (type === 'punch') ? 'z' : 'x';
              const targetRotationValue = (type === 'punch') ? -Math.PI / 2.5 : -Math.PI / 3; // Adjusted angles
              const limbToAnimate = (type === 'punch') ? arm : leg;

              limbToAnimate.userData.targetRotation = targetRotationValue;
              limbToAnimate.userData.targetAxis = targetRotationAxis;
              limbToAnimate.userData.animDuration = duration;
              limbToAnimate.userData.animProgress = 0;
          }

          function updateAttackAnimation(character, deltaTime) {
             if (!character || !character.userData || !character.userData.attacking) return;

             const arm = character.userData.rightArm;
             const leg = character.userData.rightLeg;
             if (!arm || !leg) return; // Guard

             const limbToAnimate = (character.userData.attackType === 'punch') ? arm : leg;

             if (limbToAnimate.userData.animProgress !== undefined) {
                 const progressIncrement = deltaTime / limbToAnimate.userData.animDuration;
                 limbToAnimate.userData.animProgress += progressIncrement;
                 let currentProgress = Math.min(limbToAnimate.userData.animProgress, 1.0); // Clamp

                 let rotationProgress = (currentProgress < 0.5) ? (currentProgress * 2) : ((1.0 - currentProgress) * 2);

                 const baseRotationZ_Arm = -Math.PI / 6; // Base arm rotation Z

                 if (limbToAnimate === arm) {
                      limbToAnimate.rotation.z = THREE.MathUtils.lerp(baseRotationZ_Arm, limbToAnimate.userData.targetRotation, rotationProgress);
                      limbToAnimate.rotation.x = 0; // Ensure X is reset
                 } else { // Leg
                      limbToAnimate.rotation.x = THREE.MathUtils.lerp(0, limbToAnimate.userData.targetRotation, rotationProgress);
                      limbToAnimate.rotation.z = 0; // Ensure Z is reset
                 }

                 if (limbToAnimate.userData.animProgress >= 1.0) {
                     delete limbToAnimate.userData.animProgress;
                     delete limbToAnimate.userData.animDuration;
                     delete limbToAnimate.userData.targetRotation;
                     delete limbToAnimate.userData.targetAxis;
                 }
             }
          }

          function resetLimbs(character) {
             if (!character || !character.userData) return;
             const leftArm = character.userData.leftArm;
             const rightArm = character.userData.rightArm;
             const leftLeg = character.userData.leftLeg;
             const rightLeg = character.userData.rightLeg;

             if(leftArm) leftArm.rotation.set(0, 0, Math.PI / 6);
             if(rightArm) rightArm.rotation.set(0, 0, -Math.PI / 6);
             if(leftLeg) leftLeg.rotation.set(0, 0, 0);
             if(rightLeg) rightLeg.rotation.set(0, 0, 0);

             if(rightArm && rightArm.userData) { delete rightArm.userData.animProgress; delete rightArm.userData.targetRotation; }
             if(rightLeg && rightLeg.userData) { delete rightLeg.userData.animProgress; delete rightLeg.userData.targetRotation; }
             if(character.userData) delete character.userData.hitThisAttack;
         }

        function updateIntroAnimation(deltaTime) {
            const now = clock.getElapsedTime();

            // Text fade
            if (introText && player && player.userData) { // Ensure objects exist
                 if (introText.material.opacity < 1 && player.userData.introFadeInTimer && now >= player.userData.introFadeInTimer) {
                     introText.material.opacity = Math.min(1, introText.material.opacity + deltaTime / (CONFIG.ANIMATION.textFadeTime / 1000));
                     if (introText.material.opacity >= 1) player.userData.introHoldTimer = now + CONFIG.ANIMATION.introHoldTime / 1000;
                 } else if (introText.material.opacity > 0 && player.userData.introHoldTimer && now >= player.userData.introHoldTimer) {
                     introText.material.opacity = Math.max(0, introText.material.opacity - deltaTime / (CONFIG.ANIMATION.textFadeTime / 1000));
                 }
            }

            // Character Kick
            if (player && player.userData && player.userData.introAnim && player.userData.rightLeg) {
                const anim = player.userData.introAnim;
                const leg = player.userData.rightLeg;
                const kickSpeed = CONFIG.ANIMATION.introKickSpeed;
                const maxRotation = -Math.PI / 4;

                if (anim.kicking) {
                    leg.rotation.x = Math.max(maxRotation, leg.rotation.x - kickSpeed);
                    if (leg.rotation.x <= maxRotation) { anim.kicking = false; anim.returning = true; }
                } else if (anim.returning) {
                    leg.rotation.x = Math.min(0, leg.rotation.x + kickSpeed * 1.5);
                    if (leg.rotation.x >= 0) anim.returning = false; // Stop animation
                }
            }
        }

         function updateEndingAnimation(deltaTime) {
             const now = clock.getElapsedTime();

             // Text Fade
             if (endText && player && player.userData) { // Ensure objects exist
                 if (endText.material.opacity < 1 && player.userData.endFadeInTimer && now >= player.userData.endFadeInTimer) {
                      endText.material.opacity = Math.min(1, endText.material.opacity + deltaTime / (CONFIG.ANIMATION.textFadeTime / 1000));
                 }
             }

             // Victory Pose
             if (player && player.userData && player.userData.victoryAnim && player.userData.leftArm && player.userData.rightArm) {
                 const anim = player.userData.victoryAnim;
                 const leftArm = player.userData.leftArm;
                 const rightArm = player.userData.rightArm;
                 const poseSpeed = CONFIG.ANIMATION.victoryPoseSpeed;
                 const maxRotation = -Math.PI / 3; // Raise arms higher

                 if (anim.raising) {
                      leftArm.rotation.x = Math.max(maxRotation, leftArm.rotation.x - poseSpeed);
                      rightArm.rotation.x = Math.max(maxRotation, rightArm.rotation.x - poseSpeed); // Match left arm logic
                      if (leftArm.rotation.x <= maxRotation) {
                          anim.raising = false; anim.holding = true; anim.holdTimer = now + 1.5; // Hold longer
                      }
                  } else if (anim.holding && now >= anim.holdTimer) {
                      anim.holding = false; anim.returning = true; // Add returning state
                  } else if (anim.returning) {
                      leftArm.rotation.x = Math.min(0, leftArm.rotation.x + poseSpeed * 1.5);
                      rightArm.rotation.x = Math.min(0, rightArm.rotation.x + poseSpeed * 1.5);
                      if (leftArm.rotation.x >= 0) {
                          anim.returning = false; // Stop returning
                          // Optional: restart anim.raising = true;
                      }
                  }
             }

             // Confetti
             confetti.forEach(particle => {
                  particle.position.add(particle.userData.velocity);
                  particle.rotation.x += Math.random() * 0.1;
                  particle.rotation.y += Math.random() * 0.1;
                  if (particle.position.y < CONFIG.CONFETTI.despawnY) {
                       particle.position.set( (Math.random() - 0.5) * CONFIG.ARENA.width * 0.8, CONFIG.CONFETTI.spawnY + Math.random(), (Math.random() - 0.5) * 2 );
                       particle.userData.velocity.y = -CONFIG.CONFETTI.fallSpeed * (0.8 + Math.random() * 0.4);
                  }
              });
          }


        // --- Main Loop ---
        function animate() {
            requestAnimationFrame(animate);
            const deltaTime = clock.getDelta();

            // Always update animations regardless of game state if objects exist
             if (gameState === 'intro') updateIntroAnimation(deltaTime);
             if (gameState === 'ending') updateEndingAnimation(deltaTime);

            // Update gameplay logic only in gameplay state
            if (gameState === 'gameplay') {
                updatePlayer(deltaTime);
                updateOpponent(deltaTime);
            }

            renderer.render(scene, camera);
        }

        // --- Start ---
        init();

    </script>
</body>
